<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title>Meta Tag Scraper | Free SEO Analyzer & Extractor</title>
    <meta name="title" content="Meta Tag Scraper | Free SEO Analyzer & Extractor">
    <meta name="description" content="Quickly extract and analyze meta titles, descriptions, and SEO tags from any URL. Batch check multiple websites at once and export results to Excel for free.">
    <meta name="keywords" content="meta tag scraper, seo analyzer, bulk meta checker, extract meta tags, seo tool, title length checker">
    <meta name="author" content="Meta Scraper">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://meta-data-scraper.vercel.app/">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meta-data-scraper.vercel.app/">
    <meta property="og:title" content="Meta Tag Scraper | Free SEO Analyzer & Extractor">
    <meta property="og:description" content="Quickly extract and analyze meta titles, descriptions, and SEO tags from any URL. Batch check multiple websites at once and export results to Excel for free.">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://meta-data-scraper.vercel.app/">
    <meta property="twitter:title" content="Meta Tag Scraper | Free SEO Analyzer & Extractor">
    <meta property="twitter:description" content="Quickly extract and analyze meta titles, descriptions, and SEO tags from any URL. Batch check multiple websites at once and export results to Excel for free.">

    <!-- Page Speed Optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="style.css" as="style">

    <!-- Styles & Icons -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
</head>
<body>
    <main class="app-container">
        <!-- Header -->
        <header>
            <div class="badge">● Meta Scraper</div>
            <h1>Extract <span>Meta Tags</span><br/>from any URL</h1>
            <p>// paste URLs → scan → export CSV</p>
        </header>

        <!-- Input Section -->
        <section class="input-section">
            <div class="meta-label">URLs to scan</div>
            <textarea id="url-input" placeholder="https://example.com&#10;https://another.com"></textarea>
            
            <div class="button-group">
                <button id="scan-btn" class="btn primary">⚡ Scan All</button>
                <button id="clear-btn" class="btn secondary">Clear</button>
            </div>
            
            <div id="status-text" class="status-text hidden">0 URLs queued</div>
        </section>

        <!-- Results Section -->
        <section id="results-container" class="hidden">
            <div class="results-header">
                <div id="results-title" class="results-title">Results — 0 pages</div>
                <button id="export-btn" class="btn download">↓ Export Excel (.xlsx)</button>
            </div>
            
            <div id="results-list"></div>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
